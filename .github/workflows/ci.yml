name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: shellcheck
        run: shellcheck -S style safe-restart fetch-blocklist tg-offsite-backup ssh-canary

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install bats
        run: npm install -g bats
      - name: bats
        run: bats tests/
